[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/twin-brain"
  to = "/twin-brain.html"
  status = 200

[[redirects]]
  from = "/household-name"
  to = "/household-name.html"
  status = 200

[[redirects]]
  from = "/quiz-oracle"
  to = "/quiz-oracle.html"
  status = 200

[[redirects]]
  from = "/reports"
  to = "/reports.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
